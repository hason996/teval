<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجمع تيڤال للمنزلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000; /* خلفية سوداء */
            color: #ffffff; /* نص أبيض للقراءة */
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .profile-container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo-image {
            width: 120px; /* حجم الشعار */
            height: 120px;
            border: 3px solid #00E5FF; /* إطار تركوازي دائري */
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-image img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* لملء الدائرة بالشعار */
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00E5FF; /* عنوان تركوازي */
        }

        p {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .link-card {
            background: transparent;
            border: 1px solid #00E5FF; /* إطار تركوازي */
            color: #00E5FF; /* نص تركوازي */
            padding: 15px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-align: center;
        }

        .link-card:hover {
            background: #00E5FF; /* خلفية تركوازية عند التمرير */
            color: #000000; /* نص أسود عند التمرير */
            transform: translateY(-3px);
        }

        .whatsapp-card {
            background: #25D366; /* لون أخضر للواتساب */
            border: 1px solid #25D366;
            color: #ffffff; /* نص أبيض */
        }

        .whatsapp-card:hover {
            background: #128C7E; /* لون أغمق عند التمرير */
            color: #ffffff;
        }

        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="logo-image">
            <img src="image_2.png" alt="شعار مجمع تيڤال">
        </div>
        
        <h1>مجمع تيڤال للمنزلية</h1>
        <p>هنا تجد ما تحتاج بأفضل سعر وأفضل جودة</p>

        <div class="links-container">
            <a href="https://www.instagram.com/tevalcenter?igsh=MTc0MWloazlpd2xlOA==" class="link-card" target="_blank">انستغرام - Instagram</a>
            <a href="https://www.facebook.com/share/1B7CkaiLpo/?mibextid=wwXIfr" class="link-card" target="_blank">فيسبوك - Facebook</a>
            <a href="https://www.tiktok.com/@tevalcenter?_r=1&_t=ZS-95wDyS4GCCw" class="link-card" target="_blank">تيك توك - TikTok</a>
            <a href="https://wa.me/+9647734541533" class="link-card whatsapp-card" target="_blank">تواصل معنا مباشرة عبر واتساب</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 مجمع تيڤال للمنزلية
    </div>

</body>
</html>

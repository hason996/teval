<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #D4AF37;
            font-family: 'Cairo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .profile-container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo-placeholder {
            width: 100px;
            height: 100px;
            border: 3px solid #D4AF37;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #D4AF37;
        }

        p {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .link-card {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 15px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            text-align: center;
        }

        .link-card:hover {
            background: #D4AF37;
            color: #000000;
            transform: translateY(-3px);
        }

        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="logo-placeholder">T</div>

            <a href="https://www.tiktok.com/@tevalcenter?_r=1&_t=ZS-95wDyS4GCCw" class="link-card" target="_blank">تيك توك - TikTok</a>
